services:
  - type: web
    name: taskflow-ai
    runtime: docker
    plan: free
    region: oregon
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./taskflow.db
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false
